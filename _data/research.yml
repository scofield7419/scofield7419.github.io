          fit: cover
        works:
          - name: "General-level&General-Bench"
            link: https://generalist.top/
            note: "Evaluation framework measuring progress of multimodal models toward true generalist intelligence."
          - name: "Unified-R1"
            link: https://sqwu.top/AD-Loop/
            note: "Analyzing-Drafting loop interleaves understanding and generation, improving multimodal reasoning and performance."
          - name: "MUCG Workshop"
            link: https://mllm-mucg.github.io/MM2025/
            note: "The workshop series of MLLM on Unified Comprehension and Generation."
          - name: "MLLM Tutorial"
            link: https://mllm2024.github.io/CVPR2024/
            note: "The first tutorial series of MLLM: From Multimodal LLM to Human-level AI."
  - id: cross-modal-modeling
    kicker: Direction 2
    world: Physical World
    title: Cross-modal Comprehension, Reasoning, and Generation
    summary: "Model the physical world through multimodal understanding, generation, and structured reasoning across text, speech, image, video, 3D, and 4D signals. Below, I highlight several representative research series that define this direction."
    cards:
      - title: "Javis: Joint Audio-Video Intelligence"
