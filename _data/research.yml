eyebrow: Research Statement
title: "Bridging Physical and Mental Worlds toward Human-like Intelligence"
summary: "Future human-level AI should bridge physical-world grounding with mental-world intelligence, combining unified
     multimodal capability with cognition, affection, mind, behavior, and social understanding. 
     My research aims to build multimodal AI systems that do not only interact with the external 
    world mechanically, but perceive, reason, generate, and act with increasingly advanced cognitive foundations."
worlds:
  - label: Physical World
    title: Perception, Reasoning, and Generation
    description: "Build cross-modal/multimodal systems that can understand, reason over, and 
        generate rich signals across text, speech, audio, image, video, 3D, and 4D settings."
    points:
      - Unified multimodal foundation models and agentic systems
      - Cross-modal comprehension, reasoning, and generation
      - Video, 4D, and spatiotemporal world modeling
  - label: Mental World
    title: Mind, Cognitive, and Social Modeling
    description: "Move AI beyond mechanical interaction by modeling cognition, mind, emotion, 
        empathy, mental behavior, and collective intelligence."
    points:
      - Emotion, empathy, and human-centric interaction
      - Cognitive and mental-state modeling
      - Behavior, social norms, and group intelligence
foundation_bridge:
  label: Foundation Model
  title: Foundation Multimodal LLMs and Generalists
  description: "A unified multimodal foundation model serves as the common substrate that supports 
      both physical-world grounding and mental-world intelligence, enabling generalist perception, 
      reasoning, generation, interaction, and agentic coordination across diverse modalities, paradigm 
      and tasks."
directions:
  - id: multimodal-foundation
    kicker: Direction 1
    world: Physical World
    title: Large Multimodal Foundation Models and Agentic Systems
    summary: "Unified and advanced multimodal foundational systems (LLMs and agents) that coordinate perception, reasoning, generation, and interaction across modalities. Below, I highlight several representative research series that define this direction."
    cards:
      - title: Any-to-Any MLLMs
        label: Foundation Model
        link: https://any2any-mllm.github.io/
        description: "Unified any-to-any multimodal LLMs that move beyond perception-only systems toward fully interleaved multimodal input-output intelligence."
        media:
          type: image
          src: /images/projpic/A2A/teaser3.png
          fit: cover
        works:
          - name: NExT-GPT
            link: https://next-gpt.github.io/
            note: "The first unified any-to-any multimodal LLM."
          - name: "UniM"
            link: https://any2any-mllm.github.io/unim
            note: "A benchmark for interleaved any-to-any multimodal understanding and generation."
          - name: "Any2Any Workshop"
            link: https://any2any-mllm.github.io/workshop-cvpr26/
            note: "The first workshop for this series."
          - name: "Awesome Any2Any"
            link: https://github.com/any2any-mllm/awesome-any2any
            note: "A collection of resources on Github: paper, datasets and tools."
      - title: Unified Vision LLMs
        label: Vision Intelligence
        link: https://univision-llm.github.io/
        description: "Pixel-level large vision foundation models for understanding, generation, segmentation, editing, and controllable interaction with visual content."
        media:
          type: image
          src: /images/projpic/univision/univision-idea.png
          fit: cover
        works:
          - name: Vitron
            link: https://vitron-llm.github.io/
            note: "A unified pixel-level vision LLM for understanding, generation, segmentation, and editing."
          - name: Poly-V
            link: https://sqwu.top/PolyV/
            note: "A unified vision-language model for synergistic visual comprehension and interaction."
      - title: "UniVA: Universal Video Agent"
        label: Agentic System
        link: https://univa-agent.github.io
        description: "A universal video agent that unifies video understanding, editing, tracking, planning, and creation in an automated agentic workflow."
        media:
          type: image 
          src: /images/projpic/univa/univa-teaser.png
          fit: cover
        works:
      - title: Towards Multimodal Generalist
        label: Generalist Agenda
        link: https://path2generalist.github.io/
        description: "A research line on building multimodal generalist AI unifies modalities, tasks, paradigms, enabling synergistic perception, reasoning, and generation."
