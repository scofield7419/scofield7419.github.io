          - name: LayoutLLM-T2I
            link: https://layoutllm-t2i.github.io/
            note: "Enhance fidelity of text-to-image diffusion with layout from LLMs."
          - name: MRE-ISE
            link: https://github.com/ChocoWu/MRE-ISE
