        link: https://javisverse.github.io/
        description: "Large generative foundation models for synchronized/joint audio-video generation."
        media:
          type: image
          src: /images/projpic/javisverse/javisverse.png
          fit: cover
        works:
          - name: Javis-DiT
            link: https://javisverse.github.io/JavisDiT-page/
            note: "A joint audio-video diffusion transformer for synchronized generation."
          - name: Javis-DiT++
            link: https://javisverse.github.io/JavisDiT2-page/
            note: "A stronger generation model with improved fidelity and temporal coordination."
          - name: Javis-GPT
            link: https://javisverse.github.io/JavisGPT-page/
            note: "A GPT-style multimodal system for audio-video understanding and generation."
          - name: "JAV-CG Workshop"
            link: https://javisverse.github.io/Workshop-MM26/
            note: "The 1st workshop on Joint audio-video comprehension and generation."
          - name: JAV Survey
            link: https://javisverse.github.io/Awesome-AVI
            note: "A survey-level synthesis of audio-video foundation modeling and generation."
      - title: Video Generation Lab
        label: Generation
        link: https://vid-gen.github.io
